syntax = "proto3";
package briolette.service_auth;

// Service group assignments for NAC-based service-to-service authentication.
// Services register with the registrar using these group numbers.
// High group numbers (240-255) are reserved for service groups to
// separate from wallet groups (0-63).
enum ServiceGroup {
  SERVICE_UNKNOWN = 0;
  SERVICE_CLERK = 240;
  SERVICE_MINT = 241;
  SERVICE_TOKENMAP = 242;
  SERVICE_VALIDATE = 243;
  SERVICE_RECEIVER = 244;
  SERVICE_BRIDGE = 245; // Ethereum L2 bridge service
}

// Attached as gRPC metadata for service-to-service authentication.
// The caller signs (request_hash || timestamp) with their NAC credential.
message ServiceAuthMetadata {
  // ECDAA signature over (request_hash || timestamp_nanos)
  bytes signature = 1;
  // Unix timestamp in nanoseconds (for replay prevention)
  uint64 timestamp_nanos = 2;
  // The caller's service group (verified against the signature)
  ServiceGroup caller_group = 3;
  // The randomized NAC credential used for this request
  bytes credential = 4;
}
