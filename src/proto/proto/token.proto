syntax = "proto3";
package briolette.token;

import "amount_type.proto";

message Ticket {
  bytes credential = 1;
  TicketData tags = 2;
}

message TicketData {
  uint32 group_number = 1;  // Initially, a number in the range [0, 64).
  uint32 lifetime = 2; // # of epochs (currently 86400 second periods) it is valid.
  uint64 created_on = 3;  // currrent epoch value and the required ticket request signature basename.
}

message SignedTicket {
  Ticket ticket = 1;
  // ECDSA P-256 recoverable signature over the serialized Ticket.
  // Format: 64 bytes (r || s) + 1 byte recovery ID = 65 bytes total.
  // The recovery ID (0-3) enables public key recovery without transmitting
  // the full verifying key. Consumers must pop the last byte as the
  // RecoveryId before parsing the remaining 64 bytes as an ECDSA Signature.
  bytes signature = 2;
}

message Amount {
  int32 whole = 1;
  // Fractional amount in micros (millionths of one whole unit).
  // Range: [0, 999999]. For example, 500000 represents 0.5.
  int32 fractional = 2;
  // Specifies the currency type promised but does not
  // imply issuing authority for the currency.
  // That will depend on mint (group) keys.
  AmountType code = 3;
}

enum Version {
  V0 = 0;
  V1 = 1; // BLS12-381 based ECDAA (128-bit security)
}

message Descriptor {
  Version version = 1;
  Amount value = 2;
}

message Tag {
  oneof value {
    uint64 valid_until = 2; // epoch timestamp; only honored in first transfer.
    bytes trimmed_from = 3; // original transfer signature (only verifiable by authority)
    Amount split_value = 4; // new value which is less than the Descriptor value
  }
}

message Transfer {
  // Credential commitment with policy.
  SignedTicket recipient = 1;
  repeated Tag tags = 2;
  // This is only populated during signing or verification, not for transport.
  bytes previous_signature = 3;  // Or digest(descriptor) for the 0th.
}

message History {
  Transfer transfer = 1;
  // Base (0th) signature: ECDSA P-256 recoverable signature from a mint key.
  //   Format: 64 bytes (r || s) + 1 byte recovery ID = 65 bytes total.
  //   The recovery ID allows public key recovery to match against trusted mints.
  //
  // Subsequent signatures: ECDAA (BN254/BLS12-381) group signature from a TTC
  //   credential. Variable length. The credential bytes are prepended to the
  //   signature (inflated form) or omitted (deflated form, ~260 bytes smaller).
  //
  // Trimming "reissues" the History and adds the trimmed_from tag. Trim servers
  // use a different keypair than the mint for easier abuse discovery.
  bytes signature = 2;
}

message Token {
  Descriptor descriptor = 1;
  History base = 2;
  repeated History history = 3;
  // TODO: optional "hint" value for splits?
}

