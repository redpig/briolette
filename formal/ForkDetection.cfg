\* ForkDetection model configuration
\* Maps to: src/tokenmap/src/server.rs fork detection decision tree

CONSTANTS
    Wallets = {w1, w2, w3}
    TokenIds = {t1, t2}
    Sigs = {s1, s2, s3, s4, s5}
    MaxHistory = 3
    MaxValue = 10
    MaxSubmissions = 6

INIT Init
NEXT Next

INVARIANTS
    TypeInvariant
    ValidClassification
    ConsistentValue
    SplitConservation
    DoubleSpendAlwaysDetected
    TokenMapBounded
