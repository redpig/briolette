\* BrioletteSystem composed model configuration
\* End-to-end verification of briolette protocol properties

CONSTANTS
    Wallets = {w1, w2, w3}
    Honest = {w1, w2}
    TokenIds = {t1}
    SplitTokenIds = {st1, st2}
    Edges = {{w1, w2}, {w2, w3}, {w1, w3}}
    MaxValue = 2
    MaxEpoch = 3
    MaxHistory = 2
    TicketLifetime = 2

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    EndToEndValueConservation
    NoFalseRevocation
    HonestNeverRevoked
    EpochMonotonic
    RevokedCannotRefresh
    CumulativeRevocation

\* Note: DoubleSpendLeadsToEviction liveness property omitted due to
\* bounded MaxEpoch. See RevocationProtocol.cfg for details.
