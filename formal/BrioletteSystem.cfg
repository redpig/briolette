\* BrioletteSystem composed model configuration
\* End-to-end verification of briolette protocol properties

CONSTANTS
    Wallets = {w1, w2, w3}
    Honest = {w1, w2}
    TokenIds = {t1, t2}
    SplitTokenIds = {st1, st2}
    Edges = {{w1, w2}, {w2, w3}, {w1, w3}}
    MaxValue = 5
    MaxEpoch = 3
    MaxHistory = 3
    TicketLifetime = 2

INIT Init
NEXT Next

INVARIANTS
    TypeInvariant
    EndToEndValueConservation
    NoFalseRevocation
    HonestNeverRevoked
    EpochMonotonic
    CumulativeRevocation

PROPERTIES
    DoubleSpendLeadsToEviction
