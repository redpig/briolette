\* RevocationProtocol model configuration
\* Maps to: security_model.md Invariant 4 + Eviction Completeness Theorem

CONSTANTS
    Wallets = {w1, w2, w3}
    Honest = {w1, w2}
    Edges = {{w1, w2}, {w2, w3}, {w1, w3}}
    MaxEpoch = 7
    TicketLifetime = 1

SPECIFICATION Spec

INVARIANTS
    TypeInvariant
    CumulativeRevocation
    NoFalseRevocation
    EvictedSubsetDetected

\* Note: EvictionCompleteness liveness property is not checked here because
\* the bounded MaxEpoch creates counterexamples where detection happens at
\* MaxEpoch with no room for revocation+gossip+ticket-expiry. In the real
\* system, epochs advance indefinitely. Safety invariants are sufficient.
