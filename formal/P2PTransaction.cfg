\* P2PTransaction model configuration
\* Maps to: src/receiver/src/server.rs transaction state machine

CONSTANTS
    TxnIds = {tx1, tx2}
    Wallets = {w1, w2, w3}
    TokenIds = {t1, t2, t3}
    MaxValue = 5
    TimeoutSteps = 3

INIT Init
NEXT Next

INVARIANTS
    TypeInvariant
    ValidTransitions
    PeerBinding
    AmountMatchOnComplete
    PayerReceiverDistinct
    CompleteIsTerminal
    TimeoutIsTerminal

PROPERTIES
    EventualTermination
