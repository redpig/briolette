\* TokenLifecycle model configuration
\* Maps to: src/mint/src/server.rs, src/wallet/src/lib.rs

CONSTANTS
    Wallets = {w1, w2, w3}
    TokenIds = {t1, t2, t3}
    SplitTokenIds = {st1, st2, st3, st4}
    MaxValue = 10
    MaxHistory = 4
    MaxTokens = 5

INIT Init
NEXT Next

INVARIANTS
    TypeInvariant
    ValueNeverExceedsMinted
    NoNegativeValue
    SplitValueConservation
    UniqueOwnership
    HistoryBounded
